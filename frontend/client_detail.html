<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client · Consul</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <a href="/clients" class="muted small text-decoration-none">← Back to clients</a>

        <ul class="nav nav-tabs mt-3" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-info">Info</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-conv">Conversations</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-media">Media</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-proj">Projects</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-files">Files</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-audio">Audio</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-activity">Activity</button></li>
        </ul>

        <div class="tab-content pt-3">
          <div class="tab-pane fade show active" id="tab-info"><div id="info-body"></div></div>
          <div class="tab-pane fade" id="tab-conv"><div id="conv-body">Loading…</div></div>
          <div class="tab-pane fade" id="tab-media"><div id="media-body">Loading…</div></div>
          <div class="tab-pane fade" id="tab-proj"><div id="proj-body">Loading…</div></div>
          <div class="tab-pane fade" id="tab-files"><div id="files-body">Loading…</div></div>
          <div class="tab-pane fade" id="tab-audio"><div id="audio-body">Loading…</div></div>
          <div class="tab-pane fade" id="tab-activity"><div id="activity-body">Loading…</div></div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="convDetail" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="cd-title">Conversation</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="cd-body"></div>
  </div></div></div>

  <div class="modal fade" id="linkProjectModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Link Bitrix24 Project</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">Select Bitrix24 Project Group</label>
        <select class="form-select" id="lp-group-select">
          <option value="">Loading project groups...</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="lp-save-btn">Link Project</button>
    </div>
  </div></div></div>

  <!-- Roster Modal -->
  <div class="modal fade" id="rosterModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Project Team Roster</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" style="max-height: 480px; overflow-y: auto;">
          <table class="table align-middle">
            <thead>
              <tr>
                <th style="width:50px"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Designation</th>
                <th>Department</th>
              </tr>
            </thead>
            <tbody id="roster-table-body">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/client_edit.js"></script>
  <script src="/static/js/client_detail.js"></script>
</body>
</html>
