<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrations · Consul</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
  <style>
    .intg-wrap { max-width: 100%; width: 100%; }
    .intg-card { border: 1px solid var(--line); border-radius: 16px; background: var(--surface); overflow: hidden; box-shadow: var(--sh-s); }
    .intg-head {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 22px;
      background: linear-gradient(135deg, rgba(16,163,127,.10), rgba(16,163,127,.02));
      border-bottom: 1px solid var(--line);
    }
    :root[data-theme="dark"] .intg-head { background: linear-gradient(135deg, rgba(16,163,127,.18), rgba(16,163,127,.04)); }
    .intg-logo { width: 46px; height: 46px; border-radius: 12px; background: #10A37F; color: #fff; display: grid; place-items: center; flex: none; }
    .intg-head h2 { font-size: 1.05rem; font-weight: 700; margin: 0; }
    .intg-head .sub { font-size: 12.5px; color: var(--muted); }
    .intg-status { margin-left: auto; }
    .intg-body { padding: 22px; }
    .intg-sec-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted-2); margin: 4px 0 12px; }
    .intg-field { margin-bottom: 18px; }
    .intg-field > label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .intg-field .req { color: var(--neg); }
    .intg-hint { font-size: 11.5px; color: var(--muted-2); margin-top: 5px; }
    .key-field { display: flex; align-items: stretch; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); overflow: hidden; }
    .key-field:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-100); }
    .key-field .form-control { border: none !important; box-shadow: none !important; border-radius: 0; }
    .key-field .key-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; letter-spacing: .2px; }
    .key-btn {
      flex: none; width: 42px; border: none; border-left: 1px solid var(--line);
      background: var(--surface-2); color: var(--muted); cursor: pointer;
      display: grid; place-items: center; transition: background .12s, color .12s;
    }
    .key-btn:hover { background: var(--surface); color: var(--text); }
    .conn-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
    .conn-status { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13.5px; }
    .conn-status.on { color: var(--pos); }
    .conn-status.off { color: var(--neg); }
    .conn-dot { width: 9px; height: 9px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 22%, transparent); }
    .conn-row .spacer { flex: 1; }
    .intg-divider { height: 1px; background: var(--line); margin: 22px 0; }
    .prompt-item { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .prompt-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
    .prompt-top:hover { background: var(--surface-2); }
    .prompt-top .p-title { font-weight: 600; font-size: 13.5px; }
    .prompt-top .p-desc { font-size: 11.5px; color: var(--muted-2); }
    .prompt-badge { margin-left: auto; font-size: 10.5px; }
    .prompt-body { padding: 0 14px 14px; }
    .prompt-body textarea { width: 100%; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; line-height: 1.5; min-height: 220px; resize: vertical; }
    .prompt-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .chev { transition: transform .15s; color: var(--muted-2); }
    .prompt-item.open .chev { transform: rotate(180deg); }
    .intg-foot { display: flex; align-items: center; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--line); background: var(--surface-2); }
    .intg-foot .spacer { flex: 1; }
  </style>
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <div class="intg-wrap" id="intg-root">
          <div class="text-center p-5 muted">Loading…</div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/integrations.js"></script>
</body>
</html>
