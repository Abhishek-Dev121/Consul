<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitrix24 · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <div class="card" style="max-width:680px"><div class="card-body">
          <div class="stat mb-2 p-0">
            <div class="stat-ico tint-sky"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 15l6-6"/><path d="M10 6l1-1a3.5 3.5 0 0 1 5 5l-1 1"/><path d="M14 18l-1 1a3.5 3.5 0 0 1-5-5l1-1"/></svg></div>
            <div><div class="stat-val" style="font-size:1.1rem" id="status">Checking…</div>
              <div class="stat-label">Bitrix24 connection</div></div>
          </div>
          <p class="muted mt-3">Connect this app to your Bitrix24 portal to sync projects (deals) and
            tasks onto client profiles. Configure <code>BITRIX_*</code> values in <code>.env</code> first.</p>
          <button class="btn btn-primary" id="connect-btn">Connect Bitrix24</button>
          <a class="btn btn-soft ms-2" href="/projects">View synced projects</a>
        </div></div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script>
    (async function () {
      await renderLayout("/bitrix", "Bitrix24 Integration", { crumb: "Integrations" });
      async function refresh() {
        try {
          const s = await Api.get("/api/bitrix/status");
          const el = document.getElementById("status");
          if (s.connected) {
            el.innerHTML = (s.method === "webhook" ? "Connected (Webhook) " : "Connected (OAuth) ") + Icon("check", { size: 15 });
            el.className = "stat-val text-success";
          } else {
            el.textContent = "Not connected";
            el.className = "stat-val text-danger";
          }
          el.style.fontSize = "1.1rem";
        } catch (e) { toast(e.message); }
      }
      document.getElementById("connect-btn").addEventListener("click", async () => {
        try {
          const r = await Api.get("/api/bitrix/connect");
          window.open(r.authorize_url, "_blank");
          toast("Complete the authorization in the new tab, then refresh this page.", "info");
        } catch (e) { toast(e.message); }
      });
      await refresh();
    })();
  </script>
</body>
</html>
