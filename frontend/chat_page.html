<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Chat · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none" style="position: fixed; top: 20px; right: 20px; z-index: 1055;"></div>
  
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      
      <div class="chat-layout" style="display: flex; height: calc(100vh - 60px); overflow: hidden;">
        <!-- Left Panel: Chat List -->
        <div class="chat-col chat-threads" style="width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--card-bg);">
          <div class="p-3 border-bottom d-flex align-items-center justify-content-between">
            <h5 class="mb-0" style="font-family: var(--display); font-weight: 700; color: var(--ink);">Chats</h5>
            <button class="btn btn-sm btn-primary" id="new-chat-btn" data-bs-toggle="modal" data-bs-target="#rosterModal">+ New Chat</button>
          </div>
          <div class="p-2 border-bottom">
            <input class="form-control form-control-sm" id="search-chats" placeholder="Search chats..." />
          </div>
          <div class="thread-list flex-grow-1" id="chat-list" style="overflow-y: auto; padding: 8px;">
            <!-- Dynamically populated -->
          </div>
        </div>
        
        <!-- Center Panel: Messages -->
        <div class="chat-col chat-center" id="chat-pane" style="flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative;">
          <!-- Empty State -->
          <div class="chat-empty" id="empty-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; color: var(--muted); padding: 40px;">
            <div class="ce-ic" style="font-size: 40px; margin-bottom: 16px; opacity: 0.7;" id="empty-state-icon"></div>
            <h4 class="ce-title" style="font-family: var(--display); font-weight: 700; color: var(--ink); margin-bottom: 8px;">No chat selected</h4>
            <p class="ce-sub" style="font-size: 13px; max-width: 280px; margin: 0;">Choose a colleague from the list or click "+ New Chat" to start messaging.</p>
          </div>

          <!-- Active Chat Container -->
          <div id="active-chat-container" style="display: none; flex-grow: 1; flex-direction: column; height: 100%;">
            <!-- Header -->
            <div class="chat-head border-bottom p-3 d-flex align-items-center justify-content-between" style="background: var(--card-bg);">
              <div class="d-flex align-items-center gap-3" id="chat-header-info">
                <!-- User Initials / Group Icon and Title -->
              </div>
            </div>
            
            <!-- Message Area -->
            <div class="chat-body flex-grow-1 p-3" id="message-list" style="overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--bg);">
              <!-- Dynamically populated messages -->
            </div>
            
            <!-- Typing Indicator -->
            <div id="typing-indicator" class="px-3 py-1 muted small" style="display: none; background: var(--bg); font-style: italic;">
              <!-- E.g., John is typing... -->
            </div>
            
            <!-- Composer -->
            <div class="composer p-3 border-top d-flex align-items-center gap-2" style="background: var(--card-bg);">
              <input type="file" id="attach-file" hidden />
              <button class="btn btn-icon btn-soft-primary" id="btn-attach" title="Attach file or media">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 16.41a2 2 0 0 1-2.83-2.83l8.49-8.49"/></svg>
              </button>
              <div class="flex-grow-1">
                <textarea class="form-control" id="chat-input" rows="1" placeholder="Type a message... (Enter to send)" style="resize: none;"></textarea>
              </div>
              <button class="btn btn-primary btn-icon" id="btn-send" title="Send (Enter)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
              </button>
            </div>
          </div>
        </div>
        
        <!-- Right Panel: AI Chat Insights -->
        <div class="chat-col chat-summary" id="ai-panel" style="width: 280px; border-left: 1px solid var(--border); background: var(--card-bg); padding: 20px; display: flex; flex-direction: column; overflow-y: auto;">
          <div class="text-center pb-4 border-bottom mb-4">
            <div class="ai-icon-wrap" style="width: 48px; height: 48px; border-radius: 12px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; margin: 0 auto 12px;">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3Z"/><path d="M19 15l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7.7-2Z"/></svg>
            </div>
            <h5 style="font-family: var(--display); font-weight: 700; color: var(--ink); margin-bottom: 4px;">AI Chat Analysis</h5>
            <p class="muted small mb-0">OpenAI powered summaries</p>
          </div>
          
          <div class="flex-grow-1" id="ai-insight-content">
            <div class="text-center text-muted small py-4" id="ai-no-chat">
              Select an active chat to perform AI summary and sentiment analysis.
            </div>
            <!-- Active AI details -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Chat / Roster Modal -->
  <div class="modal fade" id="rosterModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" style="font-family: var(--display); font-weight: 700;">Start a Chat</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-3">
          <input class="form-control mb-3" id="roster-search" placeholder="Search team members..." />
          <div id="roster-list" style="max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
            <!-- Dynamically populated roster list -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- AI Analysis Result Modal -->
  <div class="modal fade" id="aiModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" style="font-family: var(--display); font-weight: 700; display: flex; align-items: center; gap: 8px;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--brand);"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3Z"/><path d="M19 15l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7.7-2Z"/></svg>
            AI Insight Report
          </h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="ai-modal-body" style="line-height: 1.6; font-size: 14px;">
          <!-- Dynamically populated AI summary details -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/chat_page.js"></script>
</body>
</html>
