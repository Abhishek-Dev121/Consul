<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients · Consul</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
  <style>
    .col-md-6:has(#c-company),
    .col-md-6:has(#c-email),
    .col-md-6:has(#c-phone) { display: none !important; }
  </style>
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <div class="clients" id="grid">
          <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Create client modal -->
  <div class="modal fade" id="clientModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">New client</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="row g-3">
      <div class="col-md-6"><label class="form-label">Name <span class="req">*</span></label><input class="form-control" id="c-name" placeholder="Full name" /></div>
      <div class="col-md-6"><label class="form-label">Company</label><input class="form-control" id="c-company" /></div>
      <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" id="c-email" /></div>
      <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="c-phone" /></div>
      <div class="col-md-6">
        <label class="form-label d-flex justify-content-between w-100 mb-1">
          <span>Channel <span class="req">*</span></span>
          <a href="#" class="small text-decoration-none" id="c-add-chan-btn" style="font-weight: 500">+ Create New</a>
        </label>
        <select class="form-select" id="c-channel"><option value="">Select a channel…</option></select>
        
        <!-- Inline New Channel Form -->
        <div class="cnc-panel d-none" id="c-new-chan-wrap">
          <div class="cnc-title">New channel</div>
          <label class="cnc-label">Channel name</label>
          <input type="text" class="form-control form-control-sm mb-2" id="c-new-chan-name" placeholder="e.g. Acme — WhatsApp" autocomplete="off" />
          <label class="cnc-label">Platform type</label>
          <select class="form-select form-select-sm" id="c-new-chan-platform"><!-- populated by clients.js --></select>

          <!-- Shown only when "Create New…" is selected -->
          <div id="c-np-panel" class="np-panel" hidden>
            <div class="np-title">New platform type</div>
            <label class="cnc-label">Platform name</label>
            <input type="text" class="form-control form-control-sm mb-2" id="c-np-name" placeholder="e.g. Discord" autocomplete="off" />
            <label class="cnc-label">Platform logo <span class="np-req">*</span></label>
            <div class="np-logo-row">
              <div class="np-logo-preview empty" id="c-np-logo-preview" aria-hidden="true"></div>
              <div class="np-logo-actions">
                <button type="button" class="btn btn-soft btn-sm" id="c-np-logo-btn">Upload logo</button>
                <input type="file" id="c-np-logo-input" accept="image/*" hidden />
                <div class="np-logo-hint">PNG, JPG or SVG · under 250&nbsp;KB</div>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="button" class="btn btn-light btn-sm" id="c-new-chan-cancel">Cancel</button>
            <button type="button" class="btn btn-primary btn-sm" id="c-new-chan-save">Create channel</button>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Assignee <span class="muted small">— set to your account</span></label>
        <input class="form-control" id="c-assignee-display" disabled>
      </div>
      <div class="col-12">
        <label class="form-label">Project <span class="req">*</span> <span class="muted small">— link an existing unassigned Bitrix24 project</span></label>
        <div class="dropdown w-100">
          <button class="form-select text-start text-muted" type="button" id="c-project-btn">Select a project…</button>
          <div class="dropdown-menu p-2 w-100" id="c-project-menu">
            <input type="text" class="form-control form-control-sm mb-2" id="c-project-search" placeholder="Search projects…" />
            <div style="max-height:220px;overflow:auto" id="c-project-list"></div>
          </div>
        </div>
      </div>
      <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" id="c-notes" rows="2"></textarea></div>
    </div></div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-client">Create client</button></div>
  </div></div></div>

  <!-- Client drawer -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer"></aside>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/client_edit.js"></script>
  <script src="/static/js/clients.js"></script>
</body>
</html>
