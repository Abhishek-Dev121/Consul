<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <div class="chat-layout">
        <!-- Threads -->
        <div class="chat-col chat-threads">
          <div class="thread-search"><input class="form-control form-control-sm" id="thread-search" placeholder="🔍 Search contacts…" /></div>
          <div class="thread-list" id="thread-list"></div>
        </div>
        <!-- Conversation -->
        <div class="chat-col chat-center">
          <div class="chat-head" id="chat-head"></div>
          <div class="chat-body" id="chat-body"></div>
          <div class="composer" id="composer">
            <input type="file" id="composer-file" hidden />
            <button class="composer-attach" id="attach-btn" title="Attach file or audio" aria-label="Attach">
              <svg viewBox="0 0 24 24" fill="none"><path d="M21.4 11.05 12.25 20.2a5.5 5.5 0 0 1-7.78-7.78l9.2-9.2a3.67 3.67 0 0 1 5.18 5.18l-9.2 9.2a1.83 1.83 0 0 1-2.6-2.6l8.5-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="composer-field">
              <textarea id="composer-input" rows="1" placeholder="Type a message…  (Enter to send, Shift+Enter for new line)"></textarea>
            </div>
            <button class="composer-send" id="send-btn" title="Send (Enter)" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <!-- Summary -->
        <div class="chat-col chat-summary" id="chat-summary"></div>
      </div>
    </div>
  </div>

  <!-- Roster Modal -->
  <div class="modal fade" id="rosterModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Project Team Roster</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" style="max-height: 480px; overflow-y: auto;">
          <table class="table align-middle">
            <thead>
              <tr>
                <th style="width:50px"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Designation</th>
                <th>Department</th>
              </tr>
            </thead>
            <tbody id="roster-table-body">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
