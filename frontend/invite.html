<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept invite · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body class="d-flex align-items-center" style="min-height:100vh">
  <div class="container" style="max-width:420px">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <span class="d-inline-grid mb-2" style="width:52px;height:52px;border-radius:14px;
            background:linear-gradient(135deg,var(--brand),#4f86ff);color:#fff;place-items:center;
            font-size:26px;box-shadow:0 8px 18px rgba(37,99,235,.35)">📨</span>
          <h4 class="mb-1" style="font-weight:800">Accept your invite</h4>
          <p class="muted mb-0" id="subtitle">Validating your invite…</p>
        </div>
        <div id="toast" class="alert d-none"></div>

        <form id="invite-form" class="d-none">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" id="email" disabled />
          </div>
          <div class="mb-3">
            <label class="form-label">Create password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" required />
              <button class="btn btn-soft" type="button" id="toggle-pw">👁</button>
            </div>
            <div class="pw-meter"><span></span></div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirm" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Activate account</button>
        </form>

        <div id="invalid" class="d-none text-center">
          <p class="text-danger">This invite link is invalid or has expired.</p>
          <a href="/login" class="btn btn-soft">Go to login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    const token = qs("token");
    const form = document.getElementById("invite-form");

    function score(p){let s=0;if(p.length>=8)s++;if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;if(/\d/.test(p)&&/[^A-Za-z0-9]/.test(p))s++;return s;}
    document.getElementById("password").addEventListener("input",(e)=>{
      const m=document.querySelector(".pw-meter");const p=e.target.value;
      m.className="pw-meter "+(!p?"":["pw-weak","pw-weak","pw-medium","pw-strong"][score(p)]);
    });
    document.getElementById("toggle-pw").addEventListener("click",()=>{
      const f=document.getElementById("password");f.type=f.type==="password"?"text":"password";
    });

    (async function(){
      if(!token){ showInvalid(); return; }
      try{
        const info = await Api.get(`/api/auth/invite/${encodeURIComponent(token)}`);
        if(!info.valid){ showInvalid(); return; }
        document.getElementById("subtitle").textContent = `Welcome, ${info.name}! Set a password to get started.`;
        document.getElementById("email").value = info.email;
        form.classList.remove("d-none");
      }catch(e){ showInvalid(); }
    })();

    function showInvalid(){
      document.getElementById("subtitle").classList.add("d-none");
      document.getElementById("invalid").classList.remove("d-none");
    }

    form.addEventListener("submit", async (e)=>{
      e.preventDefault();
      const pw=document.getElementById("password").value;
      const cf=document.getElementById("confirm").value;
      if(pw.length<8) return toast("Password must be at least 8 characters");
      if(pw!==cf) return toast("Passwords do not match");
      try{
        const data = await Api.post("/api/auth/accept-invite", { token, password: pw });
        Api.setToken(data.access_token);
        location.href = "/dashboard";
      }catch(err){ toast(err.message || "Could not accept invite"); }
    });
  </script>
</body>
</html>
