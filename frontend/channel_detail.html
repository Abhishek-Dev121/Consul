<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <a href="/channels" class="muted small text-decoration-none">← Back to channels</a>
        <div class="row g-3 mt-1 mb-3" id="summary"></div>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <input class="form-control" id="search" placeholder="Search clients in this channel…" style="max-width:360px" />
          <button class="btn btn-primary" id="add-client" style="display:none">+ Add client</button>
        </div>
        <div class="card"><div class="card-body p-0">
          <table class="table row-hover mb-0">
            <thead><tr><th>Client</th><th>Company</th><th>Email</th><th>Assignees</th><th></th></tr></thead>
            <tbody id="rows"><tr><td colspan="5" class="muted p-3">Loading…</td></tr></tbody>
          </table>
        </div></div>
      </main>
    </div>
  </div>

  <!-- Add client modal -->
  <div class="modal fade" id="clientModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add client to channel</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="row g-3">
      <div class="col-6"><label class="form-label">Name *</label><input class="form-control" id="cl-name" /></div>
      <div class="col-6"><label class="form-label">Company</label><input class="form-control" id="cl-company" /></div>
      <div class="col-6"><label class="form-label">Email</label><input class="form-control" id="cl-email" /></div>
      <div class="col-6"><label class="form-label">Phone</label><input class="form-control" id="cl-phone" /></div>
    </div></div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-client">Add client</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/channel_detail.js"></script>
</body>
</html>
