<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documents · Consul</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content"><div id="view"><div class="muted">Loading…</div></div></main>
    </div>
  </div>
  <!-- Upload document modal -->
  <div class="modal fade" id="uploadModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Upload document</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">Client *</label><select class="form-select mb-3" id="up-client"></select>
      <div class="mb-3">
        <label class="form-label">Project</label>
        <select class="form-select" id="up-project"><option value="">Select Project (Optional)</option></select>
      </div>
      <div class="mb-3">
        <label class="form-label">Type</label>
        <select class="form-select" id="up-type" onchange="toggleUploadType()">
          <option value="file">File Upload</option>
          <option value="link">Online Document Link (Google Sheets/Docs)</option>
        </select>
      </div>
      <div id="up-file-group" class="mb-3">
        <label class="form-label">File *</label><input type="file" class="form-control" id="up-file" />
      </div>
      <div id="up-link-group" class="mb-3 d-none">
        <label class="form-label">Link Title *</label><input type="text" class="form-control mb-2" id="up-link-title" placeholder="Google Sheets Specs" />
        <label class="form-label">URL *</label><input type="text" class="form-control" id="up-link-url" placeholder="https://docs.google.com/..." />
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="up-save">Save</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/documents.js"></script>
</body>
</html>
