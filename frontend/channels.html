<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channels · ClientHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <!-- Filter section -->
        <div class="filterbar">
          <span class="muted small fw-bold me-1">Type</span>
          <div class="seg" id="type-filter"></div>
          <span class="muted small fw-bold ms-3 me-1">User</span>
          <select class="form-select form-select-sm" id="user-filter" style="width:auto"></select>
          <div class="ms-auto" style="min-width:220px">
            <input class="form-control form-control-sm" id="search" placeholder="Search channels…" />
          </div>
        </div>

        <div id="grid" class="chan-grid"><div class="muted">Loading…</div></div>
      </main>
    </div>
  </div>

  <!-- Create channel modal -->
  <div class="modal fade" id="channelModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Create channel</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">Channel name</label><input class="form-control mb-3" id="ch-name" placeholder="e.g. Acme — WhatsApp" />
      <label class="form-label">Platform type</label>
      <select class="form-select" id="ch-platform">
        <option value="whatsapp">WhatsApp</option><option value="upwork">Upwork</option>
        <option value="slack">Slack</option><option value="email">Email</option>
        <option value="telegram">Telegram</option><option value="other">Other</option>
      </select>
    </div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-channel">Create channel</button></div>
  </div></div></div>

  <!-- Create client modal (with channel assignment) -->
  <div class="modal fade" id="clientModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Create client</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="row g-3">
      <div class="col-6"><label class="form-label">Name *</label><input class="form-control" id="cl-name" /></div>
      <div class="col-6"><label class="form-label">Company</label><input class="form-control" id="cl-company" /></div>
      <div class="col-6"><label class="form-label">Email</label><input class="form-control" id="cl-email" /></div>
      <div class="col-6"><label class="form-label">Phone</label><input class="form-control" id="cl-phone" /></div>
      <div class="col-12"><label class="form-label">Assign to channel *</label>
        <select class="form-select" id="cl-channel"></select></div>
      <div class="col-12"><label class="form-label">Assignees</label>
        <select multiple class="form-select" id="cl-assignees" size="3"></select></div>
    </div></div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-client">Create client</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/channels.js"></script>
</body>
</html>
