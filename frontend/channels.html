<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channels · Consul</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content">
        <!-- Filter section -->
        <div class="page-toolbar chan-toolbar">
          <div class="tb-field">
            <span class="fi"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-4.3-4.3"/></svg></span>
            <input class="form-control" id="search" type="search" autocomplete="off" placeholder="Search channels…" aria-label="Search channels by name" />
          </div>
          <span class="tb-count" id="chan-count"></span>
        </div>

        <div id="grid" class="chan-grid">
          <div class="skeleton" style="height: 180px; border-radius: 12px;"></div>
          <div class="skeleton" style="height: 180px; border-radius: 12px;"></div>
          <div class="skeleton" style="height: 180px; border-radius: 12px;"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Create channel modal -->
  <div class="modal fade" id="channelModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Create channel</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">Channel name</label><input class="form-control mb-3" id="ch-name" placeholder="e.g. Acme — WhatsApp" />
      <label class="form-label">Platform type</label>
      <select class="form-select" id="ch-platform"><!-- options populated by channels.js --></select>

      <!-- Shown only when "Create New…" is selected -->
      <div id="new-platform-panel" class="np-panel" hidden>
        <div class="np-title">New platform type</div>
        <label class="form-label">Platform name</label>
        <input class="form-control mb-3" id="np-name" placeholder="e.g. Discord" autocomplete="off" />
        <label class="form-label">Platform logo <span class="np-req">*</span></label>
        <div class="np-logo-row">
          <div class="np-logo-preview" id="np-logo-preview" aria-hidden="true"></div>
          <div class="np-logo-actions">
            <button type="button" class="btn btn-soft btn-sm" id="np-logo-btn">Upload logo</button>
            <input type="file" id="np-logo-input" accept="image/*" hidden />
            <div class="np-logo-hint">PNG, JPG or SVG · square works best · under 250&nbsp;KB</div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-channel">Create channel</button></div>
  </div></div></div>

  <!-- Edit channel modal (rename) -->
  <div class="modal fade" id="editChannelModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Edit channel</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">Channel name</label>
      <input class="form-control" id="edit-ch-name" placeholder="e.g. Acme — WhatsApp" autocomplete="off" />
    </div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-edit-channel">Save changes</button></div>
  </div></div></div>

  <!-- Create client modal (with channel assignment) -->
  <div class="modal fade" id="clientModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Create client</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="row g-3">
      <div class="col-6"><label class="form-label">Name *</label><input class="form-control" id="cl-name" /></div>
      <div class="col-6"><label class="form-label">Company</label><input class="form-control" id="cl-company" /></div>
      <div class="col-6"><label class="form-label">Email</label><input class="form-control" id="cl-email" /></div>
      <div class="col-6"><label class="form-label">Phone</label><input class="form-control" id="cl-phone" /></div>
      <div class="col-12"><label class="form-label">Assign to channel *</label>
        <select class="form-select" id="cl-channel"></select></div>
      <div class="col-12"><label class="form-label">Assignees</label>
        <select multiple class="form-select" id="cl-assignees" size="3"></select></div>
    </div></div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="save-client">Create client</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/channels.js"></script>
</body>
</html>
