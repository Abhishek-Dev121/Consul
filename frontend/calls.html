<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Recordings · ClientHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/app.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="alert d-none"></div>
  <div class="app-shell">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-topbar"></header>
      <main class="content"><div id="view"><div class="muted">Loading…</div></div></main>
    </div>
  </div>
  <!-- Upload recording modal -->
  <div class="modal fade" id="uploadModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Upload call recording</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">Client *</label><select class="form-select mb-3" id="up-client"></select>
      <label class="form-label">Project</label><select class="form-select mb-3" id="up-project"><option value="">Select Project (Optional)</option></select>
      <label class="form-label">Audio/Video file *</label><input type="file" accept="audio/*,video/*" class="form-control" id="up-file" />
      <div class="muted small mt-2">After upload, click "Transcribe &amp; analyze" on the card to run Deepgram + AI.</div>
    </div>
    <div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button class="btn btn-primary" id="up-save">Upload</button></div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/layout.js"></script>
  <script src="/static/js/calls.js"></script>
</body>
</html>
